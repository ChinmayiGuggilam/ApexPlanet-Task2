<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Chinmayi Web</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">ChinmayiWeb</a>
    </div>
</nav>

<div class="main-content">
    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height:70vh;">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-4 form-card">
                    <h3 class="text-center mb-3">Register</h3>

                    <input type="text" id="username" class="form-control mb-2"
                        placeholder="Username" onkeyup="checkUsername()">
                    <small id="userMsg"></small>

                    <input type="email" id="regEmail"
                        class="form-control mb-3 mt-2"
                        placeholder="Email" required>

                    <div class="input-group mb-3">
                        <input type="password" id="password"
                            class="form-control" placeholder="Password">
                        <button class="btn btn-outline-secondary"
                            onclick="togglePassword('password')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <input type="password" id="confirmPassword"
                        class="form-control mb-3"
                        placeholder="Confirm Password">

                    <button class="btn btn-custom w-100"
                        onclick="return validateRegister()">
                        Register
                    </button>

                    <!-- Already have account -->
                    <p class="text-center mt-3 mb-0">
                        Already have an account?
                        <a href="login.html" class="fw-bold text-decoration-none">
                            Login here
                        </a>
                    </p>

                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    © 2026 Chinmayi | Task-2 Project
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
